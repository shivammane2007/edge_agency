
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edge Agency | Design. Dev. Intelligence.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #0A0A0A;
        color: white;
      }
      .bg-grid-pattern-dark {
        background-image:
          linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 2rem 2rem;
      }
      .apple-glow-dark::before {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: 1.05rem; /* slightly larger than card's border-radius */
        background: conic-gradient(from 180deg at 50% 50%, #4f4f4f -45deg, #a8a8a8 45deg, #4f4f4f 135deg, #a8a8a8 225deg, #4f4f4f 315deg);
        filter: blur(20px);
        z-index: -1;
        opacity: 0.3;
      }
      .marquee-content {
        animation: marquee 30s linear infinite;
        will-change: transform;
      }
      @keyframes marquee {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
